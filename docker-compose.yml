version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - ELASTIC_URL=http://elasticsearch:9200
    depends_on:
      - elasticsearch

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.2
    environment:
      - discovery.type=single-node
    ports:
      - "9200:9200"
